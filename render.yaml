services:
  - type: web
    name: geosentinel
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --timeout 120 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: NEWS_API_KEY
        value: ""
      - key: OPENROUTER_API_KEY
        value: ""
      - key: AIS_API_KEY
        value: ""
      - key: TWITTER_BEARER_TOKEN
        value: ""
      - key: TELEGRAM_BOT_TOKEN
        value: ""
